<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .banner{
            width:100%;
            height:100vh;
            text-align:center;
            overflow:hidden;
            position:relative;
            background-color:pink;

        }
        .banner .slider{
            position:absolute;
            width:200px;
            height:250px;
            top:10%;
            left: calc(50% - 100px);
            transform-style:preserve-3d;
            transform:perspective(1000px);
            animation:rotate 20s linear infinite;
            
        }
        @keyframes rotate{
            to{
                transform:perspective(1000px) rotateX(-16deg) rotateY(0deg);
            }
            from{
                transform:perspective(1000px) rotateX(-16deg) rotateY(360deg);
            }
        }
        .banner .slider .item{
            position:absolute;
            inset:0 0 0 0;
            transform:rotateY( calc((var(--i) - 1) * (360deg / var(--quantity))))
            translateZ(450px);
            


        }
        .banner .slider .item img{
            width:100%;
            height:100%;
            object-fit:cover;
            z-index:2;
        }
        .content{
            position:absolute;
            align-items:center;
            font-size:4em;
            top:7%;
            left:25%;
          

        }
    </style>
</head>
<body>
    <div class="banner ">
        <div class="slider" style="--quantity:6">
            <div class="item" style="--i:1"><img src="cake-1.jpg"></div>
            <div class="item" style="--i:2"><img src="cake-2.jpg"></div>
            <div class="item" style="--i:3"><img src="cake-3.jpg"></div>
            <div class="item" style="--i:4"><img src="cake-4.jpg"></div>
            <div class="item" style="--i:5"><img src="cake-5.jpg"></div>
            <div class="item" style="--i:6"><img src="kulhar.jpg"></div>
        </div>
    </div>

    <div class="content">
        <h1>Cupcakes</h1>
       
    </div>
</body>
</html>
