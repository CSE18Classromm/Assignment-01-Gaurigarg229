<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider</title>
   <link href="style.css" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Slider</h1>
        <h2>Experimenting with movement and timing</h2>
    </header>
    <div class="slider" style="--width:250px; --height:250px; --quantity:6">
        <div class="list">
            <div class="item" style="--position:1"><img src="adobe-logo.svg"></div>
            <div class="item" style="--position:2"><img src="amazon-2-logo.svg"></div>
            <div class="item" style="--position:3"><img src="flipkart-logo.svg"></div>
            <div class="item" style="--position:4"><img src="github-logo.svg"></div>
            <div class="item" style="--position:5"><img src="logo2.svg"></div>
            <div class="item" style="--position:6"><img src="netflix-2-logo.svg"></div>



        </div>
    </div>
</body>
</html>
