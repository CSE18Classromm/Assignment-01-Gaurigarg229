<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        header{
            height:200px;
            background-image:linear-gradient(to right, blue,purple ,pink );
            align-items:center;
            margin-bottom:10px;
        }
        section{
            height:200px;
            background-image:linear-gradient(to left bottom,orange, yellow);
            margin-bottom:10px;
        }
        article{
            height:200px;
             background-image:linear-gradient(to right,rgb(235, 92, 92),rgb(224, 203, 82));
             margin-bottom:10px;
        }
        footer{
            height:200px;
            background-image:linear-gradient(to right,rgba(235, 92, 92,0.6),rgba(224, 203, 82,0.8));
        }
    </style>
</head>
<body>
    <header><b><h2>Hello World</h2></b></header>
    <section>This is Gradient Section</section>
    <article>This is gradient without transparency </article>
    <footer>This is same gradient with Transparency</footer>
</body>
</html>
