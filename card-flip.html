<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            background-color:grey;
            height:500px;
            width:500px;
            position:relative;
            
            transition:2s;
        }

        
          .front{
            height:100%;
            width:100%;
            background-color:orange;
            color:blue;
            position:absolute;
            backface-visibility:hidden;
            
          }
          .back{
            background-color:pink;
            color:black;
            width:100%;
            height:100%;
            transform:rotateY(180deg);
            border:2px solid rgb(159, 54, 72);
            position:absolute;
            backface-visibility:hidden;
          }
          .card:hover .front{
            transform:rotateY(180deg);

          }
          .card:hover .back{
            transform:rotateY(0deg);
          }
        
    
    </style>
</head>
<body>
    <div class="card">

        <div class="front">
            This is the front side of the card
        </div>

        <div class="back">
            This is the back side of the card
        </div>
    </div>
</body>
</html>
