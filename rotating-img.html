<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .rotate img{
            box-shadow:0 10px 10px rgb(57, 56, 56);
           height:400px;
           width:400px;

        }
        .rotate:hover img{
            animation:spin 10s;
           

        }
        @keyframes spin{
            0%{
                transform:rotateY(0deg);

            }
            
            
            50%{
                transform:rotateY(180deg);
            }
            100%{
                transform:rotateY(0deg);
            }
        }
    </style>
</head>
<body>
    <div class="rotate">
        <img src="earth.webp">
    </div>
</body>
</html>
